<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agente de Cobros — Al Paso Dance Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0F0412; color: #f0e6ff; min-height: 100vh; padding: 1.5rem 1rem 4rem; }
    .container { max-width: 860px; margin: 0 auto; }
    header { text-align: center; margin-bottom: 2rem; }
    header h1 { font-size: 1.7rem; font-weight: 700; color: #d8b4fe; }
    header p { color: #9c7db5; margin-top: 0.3rem; font-size: 0.9rem; }

    /* Token */
    .token-box { background: #1F1228; border: 1px solid #3d1043; border-radius: 12px; padding: 1.2rem; margin-bottom: 1.5rem; }
    .token-box label { font-size: 0.8rem; color: #9c7db5; display: block; margin-bottom: 0.4rem; }
    .token-box input { width: 100%; padding: 0.6rem 0.9rem; background: #140A18; border: 1px solid #3d1043; border-radius: 8px; color: #f0e6ff; font-size: 0.85rem; }

    /* Panel control */
    .control-panel { background: #1F1228; border: 1px solid #3d1043; border-radius: 12px; padding: 1.4rem; margin-bottom: 1.5rem; }
    .control-row { display: flex; gap: 0.8rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1rem; }
    .control-group { display: flex; flex-direction: column; gap: 0.3rem; }
    .control-group label { font-size: 0.78rem; color: #9c7db5; }
    .control-group select { padding: 0.5rem 0.8rem; background: #140A18; border: 1px solid #3d1043; border-radius: 8px; color: #f0e6ff; font-size: 0.88rem; }

    /* Tabs de tipo de mensaje */
    .tipo-tabs { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .tipo-tab { padding: 0.5rem 1rem; border-radius: 20px; border: 1px solid #3d1043; background: #140A18; color: #9c7db5; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
    .tipo-tab.active { background: #6B2060; border-color: #a855f7; color: #f0e6ff; font-weight: 600; }
    .tipo-desc { font-size: 0.8rem; color: #9c7db5; margin-bottom: 1rem; padding: 0.6rem 0.9rem; background: #140A18; border-radius: 8px; border-left: 3px solid #6B2060; }

    /* Botones de acción */
    .btn { padding: 0.7rem 1.2rem; border: none; border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #6B2060, #a855f7); color: white; }
    .btn-secondary { background: #3d1043; color: #d8b4fe; border: 1px solid #6B2060; }
    .btn-sm { padding: 0.4rem 0.8rem; font-size: 0.8rem; border-radius: 8px; }
    .btn-success { background: #14532d; color: #86efac; border: 1px solid #16a34a; }
    .btn-warning { background: #713f12; color: #fde68a; border: 1px solid #d97706; }
    .btn-actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }

    /* Estado */
    #estado { text-align: center; padding: 0.8rem; color: #9c7db5; font-size: 0.9rem; min-height: 2rem; }
    #contador { text-align: center; font-size: 0.85rem; color: #a855f7; margin-bottom: 1.2rem; font-weight: 600; }

    /* Sección de pagos */
    .pagos-section { background: #1F1228; border: 1px solid #3d1043; border-radius: 12px; padding: 1.4rem; margin-bottom: 1.5rem; }
    .pagos-section h3 { color: #d8b4fe; font-size: 1rem; margin-bottom: 1rem; }
    .pagos-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .pagos-table th { color: #9c7db5; text-align: left; padding: 0.4rem 0.6rem; border-bottom: 1px solid #3d1043; }
    .pagos-table td { padding: 0.5rem 0.6rem; border-bottom: 1px solid #1F1228; vertical-align: middle; }
    .pagos-table tr:hover td { background: #140A18; }
    .badge { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-pendiente { background: #713f12; color: #fde68a; }
    .badge-pagado { background: #14532d; color: #86efac; }
    .badge-bloqueado { background: #450a0a; color: #fca5a5; }
    .badge-confirmado { background: #1e3a5f; color: #93c5fd; }
    .badge-sinconfirmar { background: #2d1b00; color: #fbbf24; }
    .badge-baja { background: #1a1a1a; color: #6b7280; }

    /* Cards de mensajes */
    .msg-card { background: #1F1228; border: 1px solid #3d1043; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; }
    .msg-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.8rem; gap: 1rem; }
    .msg-info h2 { font-size: 1rem; color: #d8b4fe; font-weight: 700; }
    .msg-info .tel { font-size: 0.82rem; color: #9c7db5; margin-top: 0.2rem; }
    .msg-info .cursos { font-size: 0.78rem; color: #a855f7; margin-top: 0.2rem; }
    .monto-badge { background: #3d1043; color: #d8b4fe; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.82rem; font-weight: 700; white-space: nowrap; }
    .msg-text { background: #140A18; border: 1px solid #2d1535; border-radius: 8px; padding: 0.9rem; font-size: 0.88rem; line-height: 1.6; color: #e9d5ff; white-space: pre-wrap; margin-bottom: 0.8rem; }
    .msg-error { background: #3b0a0a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 0.8rem; font-size: 0.82rem; color: #fca5a5; margin-bottom: 0.8rem; }
    .btn-copy { background: #3d1043; color: #d8b4fe; border: 1px solid #6B2060; }
    .btn-copy.copiado { background: #14532d; border-color: #16a34a; color: #86efac; }
    .btn-wa { background: #075e54; color: white; border: none; text-decoration: none; display: inline-flex; align-items: center; }
    .btn-wa:hover { background: #128c7e; }

    @media (max-width: 600px) {
      .control-row { flex-direction: column; }
      .pagos-table { font-size: 0.75rem; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <h1>Agente de Cobros</h1>
    <p>Al Paso Dance Studio — gestión mensual de pagos con IA</p>
  </header>

  <!-- Token -->
  <div class="token-box">
    <label>Token de sesión (se carga automático si estás logueado)</label>
    <input type="password" id="inputToken" placeholder="Pega tu token si no está logueado...">
  </div>

  <!-- Panel de control -->
  <div class="control-panel">
    <div class="control-row">
      <div class="control-group">
        <label>Mes</label>
        <select id="selMes">
          <option value="1">Enero</option><option value="2">Febrero</option>
          <option value="3">Marzo</option><option value="4">Abril</option>
          <option value="5">Mayo</option><option value="6">Junio</option>
          <option value="7">Julio</option><option value="8">Agosto</option>
          <option value="9">Septiembre</option><option value="10">Octubre</option>
          <option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
      </div>
      <div class="control-group">
        <label>Año</label>
        <select id="selAño">
          <option value="2026">2026</option>
          <option value="2027">2027</option>
        </select>
      </div>
      <button class="btn btn-secondary" onclick="crearMes()">+ Crear registros del mes</button>
      <button class="btn btn-secondary" onclick="cargarPagos()">Ver tabla de pagos</button>
    </div>

    <!-- Tabs tipo de mensaje -->
    <div class="tipo-tabs">
      <button class="tipo-tab" data-tipo="confirmacion" onclick="selTipo(this)">
        Confirmación (día ~15)
      </button>
      <button class="tipo-tab active" data-tipo="cobro" onclick="selTipo(this)">
        Cobro (día ~20)
      </button>
      <button class="tipo-tab" data-tipo="vencimiento" onclick="selTipo(this)">
        Vencimiento (días 1-5)
      </button>
    </div>
    <div class="tipo-desc" id="tipoDesc">
      Mensajes de cobro para alumnos que confirmaron sus cursos del próximo mes.
    </div>

    <button class="btn btn-primary" id="btnGenerar" onclick="generar()" style="width:100%;">
      Generar mensajes
    </button>
  </div>

  <div id="estado"></div>
  <div id="contador"></div>

  <!-- Tabla de pagos -->
  <div id="pagosSection" class="pagos-section" style="display:none;">
    <h3>Pagos del mes seleccionado</h3>
    <div id="pagosTabla" style="overflow-x:auto;"></div>
  </div>

  <!-- Mensajes generados -->
  <div id="resultados"></div>
</div>

<script>
  const MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const TIPO_DESC = {
    confirmacion: 'Pregunta a todos los alumnos activos si confirman su continuidad para el mes siguiente. Día recomendado: 15 del mes.',
    cobro: 'Mensajes de cobro para alumnos que confirmaron sus cursos del próximo mes. Día recomendado: 20-22 del mes.',
    vencimiento: 'Aviso urgente de plan vencido a alumnos con pago pendiente del mes actual. Días recomendados: 1 al 5.',
  };

  let tipoActual = 'cobro';

  // Cargar token desde sesión
  const tokenGuardado = localStorage.getItem('auth_token') || localStorage.getItem('token');
  if (tokenGuardado) document.getElementById('inputToken').value = tokenGuardado;

  // Preseleccionar mes actual
  const hoy = new Date();
  document.getElementById('selMes').value = hoy.getMonth() + 1;

  function getToken() { return document.getElementById('inputToken').value.trim(); }
  function getMes() { return parseInt(document.getElementById('selMes').value); }
  function getAño() { return parseInt(document.getElementById('selAño').value); }
  function authHeaders() { return { Authorization: `Bearer ${getToken()}` }; }

  function selTipo(btn) {
    document.querySelectorAll('.tipo-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    tipoActual = btn.dataset.tipo;
    document.getElementById('tipoDesc').textContent = TIPO_DESC[tipoActual];
  }

  function formatMonto(n) { return '$' + Number(n).toLocaleString('es-CL'); }
  function limpiarTel(t) { return (t || '').replace(/\D/g, '').replace(/^56/, ''); }

  async function copiar(btn, texto) {
    await navigator.clipboard.writeText(texto).catch(() => {});
    btn.textContent = '¡Copiado!';
    btn.classList.add('copiado');
    setTimeout(() => { btn.textContent = 'Copiar'; btn.classList.remove('copiado'); }, 2000);
  }

  // ── Crear registros del mes ──────────────────────────────────────────────
  async function crearMes() {
    if (!getToken()) return alert('Ingresa tu token primero');
    const mes = getMes();
    const año = getAño();
    if (!confirm(`¿Crear registros de pago para ${MESES[mes-1]} ${año}?\nSolo se crean alumnos que aún no tienen registro para ese mes.`)) return;
    setEstado('Creando registros...');
    try {
      const r = await fetch(`/api/alumnos?action=pagos&subaction=crear-mes&mes=${mes}&año=${año}`, {
        method: 'POST', headers: authHeaders(),
      });
      const d = await r.json();
      if (!r.ok) throw new Error(d.error);
      setEstado(`✓ ${d.creados} registros creados para ${MESES[mes-1]} ${año}`);
      cargarPagos();
    } catch (e) { setEstado('Error: ' + e.message); }
  }

  // ── Cargar tabla de pagos ────────────────────────────────────────────────
  async function cargarPagos() {
    if (!getToken()) return;
    const mes = getMes(); const año = getAño();
    try {
      const r = await fetch(`/api/alumnos?action=pagos&mes=${mes}&año=${año}`, { headers: authHeaders() });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error);
      renderPagos(data, mes, año);
    } catch (e) { console.error(e); }
  }

  function renderPagos(data, mes, año) {
    const sec = document.getElementById('pagosSection');
    const tabla = document.getElementById('pagosTabla');
    sec.style.display = 'block';

    if (data.length === 0) {
      tabla.innerHTML = `<p style="color:#9c7db5;padding:1rem;">No hay registros para ${MESES[mes-1]} ${año}. Haz clic en "+ Crear registros del mes".</p>`;
      return;
    }

    const filas = data.map(p => `
      <tr>
        <td>${p.nombre}</td>
        <td style="color:#9c7db5;font-size:0.78rem;">${p.telefono}</td>
        <td>${p.cursosActuales || '—'}</td>
        <td><span class="badge badge-${(p.estadoConfirmacion||'').toLowerCase().replace(' ','')||'sinconfirmar'}">${p.estadoConfirmacion || 'Sin confirmar'}</span></td>
        <td><span class="badge badge-${(p.estadoPago||'pendiente').toLowerCase()}">${p.estadoPago || 'Pendiente'}</span></td>
        <td>${formatMonto(p.monto)}</td>
        <td>
          <div class="btn-actions">
            ${p.estadoConfirmacion !== 'Confirmado' ? `<button class="btn btn-sm btn-success" onclick="actualizarPago('${p.id}',{estadoConfirmacion:'Confirmado'})">Confirmar</button>` : ''}
            ${p.estadoPago !== 'Pagado' ? `<button class="btn btn-sm btn-success" onclick="actualizarPago('${p.id}',{estadoPago:'Pagado',fechaPago:'${new Date().toISOString().slice(0,10)}'})">Pagado</button>` : ''}
            ${p.estadoConfirmacion !== 'Baja' ? `<button class="btn btn-sm btn-warning" onclick="actualizarPago('${p.id}',{estadoConfirmacion:'Baja'})">Baja</button>` : ''}
          </div>
        </td>
      </tr>`).join('');

    tabla.innerHTML = `
      <table class="pagos-table">
        <thead><tr>
          <th>Alumno</th><th>Teléfono</th><th>Cursos</th>
          <th>Confirmación</th><th>Pago</th><th>Monto</th><th>Acciones</th>
        </tr></thead>
        <tbody>${filas}</tbody>
      </table>`;
  }

  async function actualizarPago(id, campos) {
    try {
      const r = await fetch(`/api/alumnos?action=pagos`, {
        method: 'POST',
        headers: { ...authHeaders(), 'Content-Type': 'application/json' },
        body: JSON.stringify({ id, ...campos }),
      });
      if (r.ok) cargarPagos();
    } catch (e) { console.error(e); }
  }

  // ── Generar mensajes ─────────────────────────────────────────────────────
  async function generar() {
    if (!getToken()) { setEstado('Ingresa tu token primero.'); return; }
    const mes = getMes(); const año = getAño();
    const btn = document.getElementById('btnGenerar');
    btn.disabled = true;
    document.getElementById('resultados').innerHTML = '';
    document.getElementById('contador').textContent = '';
    setEstado('Generando mensajes con IA...');

    try {
      const url = `/api/alumnos?action=cobros&tipo=${tipoActual}&mes=${mes}&año=${año}`;
      const r = await fetch(url, { headers: authHeaders() });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || r.statusText);
      setEstado('');
      renderMensajes(data);
    } catch (e) {
      setEstado('Error: ' + e.message);
    } finally {
      btn.disabled = false;
    }
  }

  function renderMensajes(data) {
    const cont = document.getElementById('resultados');
    const ctr = document.getElementById('contador');

    if (data.length === 0) {
      ctr.textContent = '';
      cont.innerHTML = `<div style="text-align:center;padding:3rem;color:#9c7db5;"><div style="font-size:3rem;margin-bottom:1rem;">🎉</div><p>No hay alumnos para este tipo de mensaje.</p></div>`;
      return;
    }

    ctr.textContent = `${data.length} alumno${data.length !== 1 ? 's' : ''}`;
    cont.innerHTML = '';

    data.forEach(a => {
      const tel = limpiarTel(a.telefono);
      const waLink = tel ? `https://wa.me/56${tel}?text=${encodeURIComponent(a.mensaje)}` : null;
      const cursos = a.cursosAct || a.cursos || [];
      const card = document.createElement('div');
      card.className = 'msg-card';
      card.innerHTML = `
        <div class="msg-header">
          <div class="msg-info">
            <h2>${a.nombre || 'Sin nombre'}</h2>
            <div class="tel">${a.telefono || 'Sin teléfono'}</div>
            ${cursos.length ? `<div class="cursos">${cursos.join(' · ')}</div>` : ''}
          </div>
          <div class="monto-badge">${formatMonto(a.monto)}</div>
        </div>
        ${a.error
          ? `<div class="msg-error">Error: ${a.error}</div>`
          : `<div class="msg-text">${a.mensaje}</div>`
        }
        <div class="btn-actions">
          ${!a.error ? `<button class="btn btn-sm btn-copy" onclick="copiar(this,${JSON.stringify(a.mensaje)})">Copiar</button>` : ''}
          ${waLink ? `<a class="btn btn-sm btn-wa" href="${waLink}" target="_blank">Abrir WhatsApp</a>` : ''}
        </div>`;
      cont.appendChild(card);
    });
  }

  function setEstado(msg) { document.getElementById('estado').textContent = msg; }
</script>
</body>
</html>
